name: CI — DocApp

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: "8.0.x"

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore NuGet packages
        run: dotnet restore src/DocApp.sln

      - name: Build solution
        run: dotnet build src/DocApp.sln --no-restore -c Release

      - name: Run tests
        run: dotnet test src/DocApp.sln --no-build -c Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: .NET Tests
          path: "**/*.trx"
          reporter: dotnet-trx

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t docapp-api:${{ github.sha }} .

      - name: Build Worker Docker image
        run: docker build -f Dockerfile.worker -t docapp-worker:${{ github.sha }} .

      # Optional: Push to Azure Container Registry on main branch
